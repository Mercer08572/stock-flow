version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "sql/schema/schema.sql"
    queries:
      - "sql/queries/materials.sql"
      - "sql/queries/material_categories.sql"
      - "sql/queries/units.sql"
    gen:
      go:
        package: "materialdb"
        out: "internal/material/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_pointers_for_null_types: true
        emit_interface: true
        omit_unused_structs: true
