version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "migrations/202606110001_create_basic_master_data_tables.up.sql"
    queries:
      - "sql/queries/materials.sql"
    gen:
      go:
        package: "materialdb"
        out: "internal/material/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_pointers_for_null_types: true
        emit_interface: true
